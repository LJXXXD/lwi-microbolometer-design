input_file_path: './trained_models_dist_bf_pca_smooth.pkl'

group_criteria: ['Substance Comb', 'Temperature_K']
target_group: ['(0, 1, 2, 3)', 293.15]

substance_ind_list: [0, 1, 2, 3]

# basis_func_ind_list: [0, 1, 2, 3, 4, 5, 6]
# basis_func_ind_list: [0, 1, 2, 3, 4, 5, 6]
basis_func_ind_list: [0, 1, 2, 3]
num_bf: 4

temp_K_list:
  start: 253.15
  stop: 303.15
  step: 5
  # Or to use a predefined list, uncomment below:
  values: [293.15]

train_noise:
  start: 0
  stop: 1.0
  step: 0.2
  # Or to use a predefined list, uncomment below:
  values: [0]


test_noise:
  start: 0
  stop: 2.0
  step: 0.2
  # Or to use a predefined list, uncomment below:
  values: [0]


air_refractive_index: 1
atm_dist_ratio:
  start: 0.05
  stop: 1
  step: 0.05
  # Or to use a predefined list, uncomment below:
  values: [0.11]
percentage_step: 0.05


train_percentage: 0.8
batch_size: 200
loss_func_names: ['L1Loss', 'MSELoss']
learning_rate: 2.0e-3
num_epochs: 500
device: cpu
k_fold_flag: true
k: 5
random_flag: true
random_seed: 28

confidence: 0.95


file_paths:
  air_trans_file: './data/Test 3 - 4 White Powers/Air transmittance.xlsx'
  # basis_func_file: './data/Test 3 - 4 White Powers/Basis functions_4-20um.xlsx'\
  basis_func_file: './data/Test 3 - 4 White Powers/Basis functions_pc1_pc2_smooth.xlsx'
  spectra_file: './data/Test 3 - 4 White Powers/white_powders_spectra.xlsx'
  substances_emit_file: './data/Test 3 - 4 White Powers/white_powders.xlsx'
  substance_names_file: './data/Test 3 - 4 White Powers/white_powders_names.xlsx'

output_folder: './'
output_file_name: 'test_with_trained_models_bf_pca_smooth'
